apiVersion: apps/v1
kind: Deployment
metadata:
  name: tp-k8s-app
  labels:
    app: tp-k8s-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tp-k8s-app
  template:
    metadata:
      labels:
        app: tp-k8s-app
    spec:
      containers:
        - name: tp-k8s-app
          image: alisterfl/tp-k8s-app:v1
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: tp-k8s-app-secret
          volumeMounts:
            - name: config-volume
              mountPath: /app/config
      volumes:
        - name: config-volume
          configMap:
            name: tp-k8s-app-config
